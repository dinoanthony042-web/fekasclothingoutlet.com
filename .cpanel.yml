---
deployment:
  tasks:
    # Set paths
    - export APPPATH=/home/fekavpnn/fekasclothingoutlet.com
    - export PUBLICPATH=/home/fekavpnn/public_html

    # Ensure storage folder exists
    - mkdir -p $PUBLICPATH/storage

    # Copy public assets
    - /bin/cp -R public/* $PUBLICPATH

    # Copy uploaded files
    - /bin/cp -R storage/app/public/* $PUBLICPATH/storage/

    # Go to Laravel app
    - cd $APPPATH

    # Install dependencies
    - composer install --no-dev --optimize-autoloader

    # Clear old cache
    - php artisan optimize:clear

    # Cache optimization
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache

    # Database migrations
    - php artisan migrate --force

    # Fix permissions
    - chmod -R 755 storage bootstrap/cache